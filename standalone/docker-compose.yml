networks:
  ldap-internal:
    driver: bridge

services:
  openldap:
    image: cleanstart/openldap:2.6.13
    container_name: openldap
    hostname: openldap
    restart: always
    # Uncomment for TLS/LDAPS support (requires certs + TLS config in slapd-config.ldif):
    #command: ["slapd", "-d", "0", "-h", "ldap:// ldaps://", "-F", "/etc/openldap/slapd.d"]
    ports:
      - 389:389
      - 636:636
    volumes:
      - ./backup:/backup
      - ./certs:/etc/openldap/certs:ro
      - ./data/slapd.d:/etc/openldap/slapd.d
      - ./data/openldap-data:/var/lib/openldap/openldap-data
      - ./data/accesslog-data:/var/lib/openldap/accesslog-data
    networks:
      - ldap-internal
    logging:
      driver: json-file
      options:
        "max-size": "10m"
        "max-file": "5"

  phpldapadmin:
    image: phpldapadmin/phpldapadmin:2.3.11
    container_name: phpldapadmin
    hostname: phpldapadmin
    restart: always
    ports:
      - 8080:8080
    environment:
      # https://github.com/leenooks/phpLDAPadmin/wiki/Configuration-Variables
      # docker run -it --rm phpldapadmin/phpldapadmin ./artisan key:generate --show
      - APP_KEY=base64:QyPrQb0gZEn+9kkBfBXzc2Io8JH6ajsiSvWJCgIfeMg=
      - APP_TIMEZONE=Europe/Paris
      - APP_URL=http://localhost:8080
      - LDAP_HOST=openldap
      - LDAP_CONNECTION=ldap # ldap/ldaps/starttls
      - LDAP_PORT=389 # Or 636 if ldaps
      - LDAP_BASE_DN=dc=example,dc=org
      - LDAP_USERNAME=cn=phpldapadmin,ou=service-accounts,dc=example,dc=org
      - LDAP_PASSWORD=phpldapadmin
      - LDAP_LOGIN_ATTR=uid
      - LDAP_LOGIN_ATTR_DESC=Username
    depends_on:
      - openldap
    networks:
      - ldap-internal
    logging:
      driver: json-file
      options:
        "max-size": "10m"
        "max-file": "5"

  selfservice-password:
    image: ltbproject/self-service-password:1.7.3
    container_name: selfservice-password
    hostname: selfservice-password
    restart: always
    ports:
      - 8088:80
    depends_on:
      - openldap
    volumes:
      - ./ssp.conf.php:/var/www/conf/config.inc.local.php
    networks:
      - ldap-internal
    logging:
      driver: json-file
      options:
        "max-size": "10m"
        "max-file": "5"

{{- if and .Values.ingress.enabled (eq .Values.ingress.mode "ingress-nginx") -}}
{{- required "self-service-password.ingress.host is required when ingress is enabled" .Values.ingress.host -}}
{{- $fullName := include "ssp.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ssp.labels" . | nindent 4 }}
  {{- with .Values.ingress.ingressNginx.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressNginx.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ default (printf "%s-tls" $fullName) .Values.ingress.tls.existingSecret }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- if and .Values.ingress.enabled (eq .Values.ingress.mode "gateway-api") -}}
{{- required "self-service-password.ingress.host is required when ingress is enabled" .Values.ingress.host -}}
{{- $fullName := include "ssp.fullname" . -}}
{{- $gwName := default (printf "%s-http" $fullName) .Values.ingress.gatewayAPI.gatewayName -}}
{{- $gwNs   := default .Release.Namespace .Values.ingress.gatewayAPI.gatewayNamespace -}}
{{- if not .Values.ingress.gatewayAPI.gatewayName }}
{{- required "self-service-password.ingress.gatewayAPI.gatewayClassName is required when chart provisions the Gateway" .Values.ingress.gatewayAPI.gatewayClassName }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gwName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ssp.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.ingress.gatewayAPI.gatewayClassName }}
  listeners:
    - name: {{ .Values.ingress.gatewayAPI.listenerName }}
      port: {{ .Values.ingress.gatewayAPI.port }}
      protocol: {{ ternary "HTTPS" "HTTP" .Values.ingress.tls.enabled }}
      hostname: {{ .Values.ingress.host }}
      {{- if .Values.ingress.tls.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ default (printf "%s-tls" $fullName) .Values.ingress.tls.existingSecret }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ssp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNs }}
      sectionName: {{ .Values.ingress.gatewayAPI.listenerName }}
  hostnames:
    - {{ .Values.ingress.host | quote }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.service.port }}
{{- end }}
{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled .Values.ingress.tls.certManager.enabled -}}
{{- $fullName := include "ssp.fullname" . -}}
{{- required "certManager.issuerRef.name is required" .Values.ingress.tls.certManager.issuerRef.name -}}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ssp.labels" . | nindent 4 }}
spec:
  secretName: {{ printf "%s-tls" $fullName }}
  commonName: {{ .Values.ingress.host }}
  dnsNames:
    - {{ .Values.ingress.host | quote }}
  issuerRef:
    name: {{ .Values.ingress.tls.certManager.issuerRef.name }}
    kind: {{ default "ClusterIssuer" .Values.ingress.tls.certManager.issuerRef.kind }}
    group: cert-manager.io
{{- end }}

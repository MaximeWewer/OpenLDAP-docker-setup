{{- /*
RBAC for the users / groups / ppolicy sync Jobs.

The sync Jobs need to:
  - create/update/read/delete Secrets in the release namespace (per-user
    passwords storage when secrets.backend=kubernetes);
  - list Secrets (for drift detection: find <release>-openldap-user-*
    Secrets whose user is no longer in values.users → clean them up
    alongside the LDAP entry).

Nothing outside the release namespace is granted; cluster-scoped access
is never needed (external-secrets integration delegates to ESO's own
controller SA rather than expanding this Role).
*/ -}}
{{- $needScaleWatcher := and (eq .Values.mode "multi-master") (or .Values.hpa.enabled .Values.scaleSchedule) -}}
{{- if or .Values.users .Values.groups .Values.policies .Values.acls .Values.treeGrants .Values.overlays .Values.backup.enabled .Values.accesslogPurgeJob.enabled .Values.aclLintCronJob.enabled .Values.scaleSchedule $needScaleWatcher (and .Values.tls.enabled (eq .Values.tls.backend "job")) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openldap.fullname" . }}-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: sync
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openldap.fullname" . }}-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: sync
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  {{- if or .Values.acls .Values.treeGrants .Values.overlays }}
  # State ConfigMap `<release>-openldap-sync-state` tracks acls / tree-grants /
  # overlays across upgrades so drift removal knows what was previously applied.
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, create, update, patch]
  {{- end }}
  {{- if or (and .Values.tls.enabled (eq .Values.tls.backend "job") .Values.tls.job.rollingRestartOnRenew) $needScaleWatcher }}
  # TLS renew CronJob triggers `kubectl rollout restart` on the STS.
  # Scale-watcher Deployment watches spec.replicas + patches on change.
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [get, list, watch, patch]
  {{- end }}
  {{- if and .Values.scaleSchedule .Values.hpa.enabled }}
  # scaleSchedule CronJobs adjust HPA min/max at scheduled times.
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, patch]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openldap.fullname" . }}-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: sync
subjects:
  - kind: ServiceAccount
    name: {{ include "openldap.fullname" . }}-sync
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openldap.fullname" . }}-sync
{{- end }}

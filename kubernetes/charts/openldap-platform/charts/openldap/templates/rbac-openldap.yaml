{{- /*
RBAC for the openldap pod itself — only when mode=multi-master.
The initContainer needs `statefulsets/get` to fetch the live spec.replicas
at boot (Fix A of the full-auto scaling path), so pods created by an HPA
scale event see the correct REPLICA_COUNT even though .Values.replicaCount
never changed. Without this, HPA-driven pods bootstrap against the
render-time replica count and misconfigure syncrepl.

Standalone / mirror don't need this — replicaCount is fixed at 1 or 2.
*/}}
{{- if eq .Values.mode "multi-master" -}}
{{- $fullName := include "openldap.fullname" . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
rules:
  - apiGroups: [apps]
    resources: [statefulsets]
    resourceNames: [{{ $fullName | quote }}]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
subjects:
  - kind: ServiceAccount
    name: {{ include "openldap.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-server
{{- end }}

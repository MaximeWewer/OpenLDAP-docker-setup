{{- if .Values.backup.enabled -}}
{{- $fullName := include "openldap.fullname" . -}}
{{- $claimName := default (printf "%s-backup" $fullName) .Values.backup.persistence.existingClaim -}}
{{- $dataFile := replace "{{ .kind }}" "data"   .Values.backup.fileNamePattern -}}
{{- $cfgFile  := replace "{{ .kind }}" "config" .Values.backup.fileNamePattern -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullName }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "openldap.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ $fullName }}-sync
          securityContext:
            runAsNonRoot: false        # apk add needs root
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: "{{ .Values.cli.image.repository }}:{{ .Values.cli.image.tag }}"
              imagePullPolicy: {{ .Values.cli.image.pullPolicy }}
              env:
                - name: RELEASE_NAME
                  value: {{ .Release.Name | quote }}
                - name: RELEASE_FULLNAME
                  value: {{ $fullName | quote }}
                - name: RELEASE_NAMESPACE
                  value: {{ .Release.Namespace | quote }}
                - name: LDAP_URL
                  value: "ldap://{{ $fullName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.ldapPort }}"
                - name: LDAP_BASE_DN
                  value: {{ .Values.directory.suffix | quote }}
                - name: LDAP_BIND_DN
                  value: {{ .Values.admin.bindDN | quote }}
                - name: LDAP_USER_OU
                  value: "ou=users"
                - name: LDAP_GROUP_OU
                  value: "ou=groups"
                - name: LDAP_POLICY_OU
                  value: "ou=policies"
                - name: LDAP_MAIL_DOMAIN
                  value: {{ include "openldap.mailDomain" . | quote }}
                - name: CLI_VERSION
                  value: {{ .Values.cli.version | quote }}
                - name: CLI_DOWNLOAD_URL
                  value: {{ .Values.cli.downloadUrl | quote }}
                - name: KUBECTL_VERSION
                  value: {{ .Values.cli.kubectlVersion | quote }}
                - name: WAIT_TIMEOUT_SECONDS
                  value: {{ .Values.cli.waitForLdap.timeoutSeconds | quote }}
                - name: WAIT_INTERVAL_SECONDS
                  value: {{ .Values.cli.waitForLdap.intervalSeconds | quote }}
                - name: INCLUDE_OPERATIONAL
                  value: {{ .Values.backup.includeOperational | quote }}
                - name: RETENTION_DAYS
                  value: {{ .Values.backup.retentionDays | quote }}
                # Date stamp resolved by the CronJob invocation itself so files
                # get the actual RUN date, not the render date.
                - name: DATA_FILENAME_TEMPLATE
                  value: {{ $dataFile | quote }}
                - name: CONFIG_FILENAME_TEMPLATE
                  value: {{ $cfgFile | quote }}
              command: ["/bin/sh", "-euc"]
              args:
                - |
                  DATE=$(date -u +%Y%m%d)
                  export DATA_FILENAME=$(printf '%s' "$DATA_FILENAME_TEMPLATE" | sed "s|{{ "{{" }} .date {{ "}}" }}|$DATE|g")
                  export CONFIG_FILENAME=$(printf '%s' "$CONFIG_FILENAME_TEMPLATE" | sed "s|{{ "{{" }} .date {{ "}}" }}|$DATE|g")
                  exec /bin/sh /scripts/backup.sh
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: admin-secret
                  mountPath: /secrets
                  readOnly: true
                - name: backup
                  mountPath: /backup
          volumes:
            - name: scripts
              configMap:
                name: {{ $fullName }}-sync-scripts
                defaultMode: 0555
            - name: admin-secret
              secret:
                secretName: {{ include "openldap.adminSecretName" . }}
                defaultMode: 0400
            - name: backup
              {{- if .Values.backup.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ $claimName }}
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}

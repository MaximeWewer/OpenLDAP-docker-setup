{{- /*
Client-facing service — the DNS name applications should use. Round-robins
across ready pods in HA modes; single backend in standalone.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openldap.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.clusterIP }}
  clusterIP: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  {{- with .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    {{- include "openldap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    {{- if .Values.service.enableLdapPort }}
    - name: ldap
      port: {{ .Values.service.ldapPort }}
      targetPort: ldap
      protocol: TCP
      {{- with .Values.service.ldapNodePort }}
      nodePort: {{ . }}
      {{- end }}
    {{- end }}
    {{- if and .Values.tls.enabled .Values.service.enableLdapsPort }}
    - name: ldaps
      port: {{ .Values.service.ldapsPort }}
      targetPort: ldaps
      protocol: TCP
      {{- with .Values.service.ldapsNodePort }}
      nodePort: {{ . }}
      {{- end }}
    {{- end }}
    {{- if .Values.monitoring.enabled }}
    - name: metrics
      port: {{ .Values.monitoring.exporter.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}

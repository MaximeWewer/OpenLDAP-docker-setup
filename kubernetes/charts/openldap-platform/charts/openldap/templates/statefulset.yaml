{{- /*
StatefulSet — one PVC per replica (data/), three mount points via subPath:
  slapd.d/         -> /etc/openldap/slapd.d
  openldap-data/   -> /var/lib/openldap/openldap-data
  accesslog-data/  -> /var/lib/openldap/accesslog-data

The bootstrap initContainer runs slapadd only when cn=config is absent — safe
to re-run on pod restart or upgrade. It reads admin/config-admin passwords
from the mounted Secret (never persisted in cleartext) and hashes them with
slappasswd before writing them into cn=config.
*/ -}}
{{- $fullName := include "openldap.fullname" . -}}
{{- $mode := .Values.mode -}}
{{- $replicas := int .Values.replicaCount -}}
{{- if not (has $mode (list "standalone" "mirror" "multi-master")) -}}
{{- fail (printf "openldap.mode=%q is invalid — expected standalone | mirror | multi-master" $mode) -}}
{{- end -}}
{{- if and (eq $mode "standalone") (ne $replicas 1) -}}
{{- fail (printf "openldap.replicaCount must be 1 for mode=standalone (got %d)" $replicas) -}}
{{- end -}}
{{- if and (eq $mode "mirror") (ne $replicas 2) -}}
{{- fail (printf "openldap.replicaCount must be 2 for mode=mirror (got %d)" $replicas) -}}
{{- end -}}
{{- if and (eq $mode "multi-master") (lt $replicas 2) -}}
{{- fail (printf "openldap.replicaCount must be >= 2 for mode=multi-master (got %d)" $replicas) -}}
{{- end -}}
{{- $ha := ne $mode "standalone" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "openldap.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "openldap.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openldap.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod rollout when the bootstrap ConfigMap or admin Secret changes.
        checksum/bootstrap: {{ include (print $.Template.BasePath "/configmap-bootstrap.yaml") . | sha256sum }}
        {{- if not .Values.admin.existingSecret }}
        checksum/admin-secret: {{ include (print $.Template.BasePath "/secret-admin.yaml") . | sha256sum }}
        {{- end }}
        {{- if $ha }}
        # Force pod rollout when peer topology changes — replicaCount,
        # serverIdBase, externalPeers. Each pod's initContainer detects the
        # mismatched .topology-hash on the PVC and rebuilds cn=config with
        # the new peer list (data DB preserved). Enables full-auto scale
        # up/down of the writable pool.
        checksum/topology: {{ printf "%s|%d|%d|%s|%s" $mode (int .Values.replicaCount) (int .Values.replication.serverIdBase) (join "," .Values.replication.externalPeers) .Values.directory.suffix | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "openldap.serviceAccountName" . }}
      # multi-master needs the SA token mounted so the bootstrap initContainer
      # can query STS.spec.replicas at boot (full-auto HPA-driven scaling).
      automountServiceAccountToken: {{ if eq $mode "multi-master" }}true{{ else }}{{ .Values.serviceAccount.automountServiceAccountToken }}{{ end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := include "openldap.affinity" (dict "context" . "component" "server") | trim }}
      {{- if $aff }}
      affinity:
        {{- $aff | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: bootstrap
          image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          imagePullPolicy: {{ .Values.initImage.pullPolicy }}
          command: ["/bin/sh", "/bootstrap/bootstrap.sh"]
          env:
            - name: APK_PACKAGES
              value: {{ .Values.initImage.packages | quote }}
            - name: OWNER_UID
              value: {{ .Values.securityContext.runAsUser | quote }}
            - name: OWNER_GID
              value: {{ .Values.securityContext.runAsGroup | quote }}
            - name: MODE
              value: {{ $mode | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if $ha }}
            - name: SERVER_ID_BASE
              value: {{ .Values.replication.serverIdBase | quote }}
            - name: REPLICA_COUNT
              value: {{ $replicas | quote }}
            - name: HEADLESS_SVC
              value: {{ include "openldap.headlessServiceName" . }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REPLICATOR_DN
              value: "{{ .Values.replication.replicator.dn }},{{ .Values.directory.suffix }}"
            - name: REPLICA_LDAP_PORT
              value: {{ .Values.service.ldapPort | quote }}
            - name: SEED_ORDINAL_ZERO_ONLY
              value: {{ .Values.replication.seedOnOrdinalZeroOnly | quote }}
            - name: SYNCREPL_RETRY
              value: {{ .Values.replication.retry | quote }}
            - name: EXTERNAL_PEERS
              value: {{ join "," .Values.replication.externalPeers | quote }}
            - name: SUFFIX
              value: {{ .Values.directory.suffix | quote }}
            {{- if eq $mode "multi-master" }}
            # Bootstrap resolves REPLICA_COUNT from the live STS at boot in
            # multi-master (fallback: env value above). Requires the SA token
            # projected into the pod (automountServiceAccountToken: true).
            - name: STS_NAME
              value: {{ $fullName | quote }}
            {{- end }}
            - name: ADMIN_DN
              value: {{ .Values.admin.bindDN | quote }}
            - name: SVC_NAME
              value: {{ $fullName | quote }}
            - name: STARTTLS
              value: {{ .Values.replication.startTLS | quote }}
            - name: TLS_REQCERT
              value: {{ .Values.replication.tlsReqcert | quote }}
            {{- end }}
          # Runs as root: apk needs privileges + files are chowned to
          # <OWNER_UID>:<OWNER_GID> at the end so the main container reads them.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [CHOWN, FOWNER, DAC_OVERRIDE]
          volumeMounts:
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
            - name: admin-secret
              mountPath: /secrets
              readOnly: true
            {{- if $ha }}
            - name: replicator-secret
              mountPath: /replicator
              readOnly: true
            {{- end }}
            {{- if or .Values.customSchemas.files .Values.customSchemas.existingConfigMap }}
            - name: custom-schemas
              mountPath: /custom-schemas
              readOnly: true
            {{- end }}
            {{- if or .Values.customLdifs.files .Values.customLdifs.existingConfigMap }}
            - name: custom-ldifs
              mountPath: /custom-ldifs
              readOnly: true
            {{- end }}
            - name: data
              mountPath: /etc/openldap/slapd.d
              subPath: slapd.d
            - name: data
              mountPath: /var/lib/openldap/openldap-data
              subPath: openldap-data
            - name: data
              mountPath: /var/lib/openldap/accesslog-data
              subPath: accesslog-data
            - name: run
              mountPath: /run/openldap
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      containers:
        - name: openldap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- if .Values.command }}
            {{- toYaml .Values.command | nindent 12 }}
            {{- else }}
            - slapd
            {{- end }}
          args:
            {{- if .Values.args }}
            {{- toYaml .Values.args | nindent 12 }}
            {{- else }}
            - "-d"
            - "0"
            - "-h"
            - "ldap:///{{ if .Values.tls.enabled }} ldaps:///{{ end }}"
            - "-F"
            - "/etc/openldap/slapd.d"
            {{- end }}
          ports:
            - name: ldap
              containerPort: {{ .Values.service.ldapPort }}
              protocol: TCP
            {{- if .Values.tls.enabled }}
            - name: ldaps
              containerPort: {{ .Values.service.ldapsPort }}
              protocol: TCP
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
            capabilities:
              drop: [ALL]
              # slapd binds privileged port 389 (and 636 when TLS is on).
              add: [NET_BIND_SERVICE]
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /etc/openldap/slapd.d
              subPath: slapd.d
            - name: data
              mountPath: /var/lib/openldap/openldap-data
              subPath: openldap-data
            - name: data
              mountPath: /var/lib/openldap/accesslog-data
              subPath: accesslog-data
            - name: run
              mountPath: /run/openldap
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/openldap/certs
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.monitoring.enabled }}
        - name: exporter
          image: "{{ .Values.monitoring.exporter.image.repository }}:{{ .Values.monitoring.exporter.image.tag }}"
          imagePullPolicy: {{ .Values.monitoring.exporter.image.pullPolicy }}
          env:
            - name: LDAP_URL
              value: "ldap://127.0.0.1:{{ .Values.service.ldapPort }}"
            - name: LDAP_USERNAME
              value: {{ .Values.configAdmin.bindDN | quote }}
            - name: LDAP_PASSWORD_FILE
              value: /secrets/config-admin-password
            - name: LDAP_SERVER_NAME
              value: {{ include "openldap.fullname" . | quote }}
            - name: LISTEN_ADDRESS
              value: ":{{ .Values.monitoring.exporter.port }}"
            {{- with .Values.monitoring.exporter.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.monitoring.exporter.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            # Image's USER is "nonroot" (name, not numeric UID) — Kubernetes
            # cannot verify against runAsNonRoot, so pin the UID explicitly
            # (distroless nonroot = 65532).
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.monitoring.exporter.resources | nindent 12 }}
          volumeMounts:
            - name: admin-secret
              mountPath: /secrets
              readOnly: true
        {{- end }}
      volumes:
        - name: bootstrap
          configMap:
            name: {{ include "openldap.bootstrapConfigMapName" . }}
            defaultMode: 0555
        - name: admin-secret
          secret:
            secretName: {{ include "openldap.adminSecretName" . }}
            defaultMode: 0400
        {{- if $ha }}
        - name: replicator-secret
          secret:
            secretName: {{ include "openldap.replicatorSecretName" . }}
            defaultMode: 0400
        {{- end }}
        {{- if or .Values.customSchemas.files .Values.customSchemas.existingConfigMap }}
        - name: custom-schemas
          projected:
            sources:
              {{- if .Values.customSchemas.files }}
              - configMap:
                  name: {{ include "openldap.fullname" . }}-custom-schemas
              {{- end }}
              {{- if .Values.customSchemas.existingConfigMap }}
              - configMap:
                  name: {{ .Values.customSchemas.existingConfigMap }}
              {{- end }}
        {{- end }}
        {{- if or .Values.customLdifs.files .Values.customLdifs.existingConfigMap }}
        - name: custom-ldifs
          projected:
            sources:
              {{- if .Values.customLdifs.files }}
              - configMap:
                  name: {{ include "openldap.fullname" . }}-custom-ldifs
              {{- end }}
              {{- if .Values.customLdifs.existingConfigMap }}
              - configMap:
                  name: {{ .Values.customLdifs.existingConfigMap }}
              {{- end }}
        {{- end }}
        - name: run
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "openldap.tlsSecretName" . }}
            defaultMode: 0400
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "openldap.labels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}

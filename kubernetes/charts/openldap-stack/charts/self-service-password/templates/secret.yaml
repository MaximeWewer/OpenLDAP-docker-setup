{{- if not .Values.general.keyphraseExistingSecret -}}
{{- $secretName := printf "%s-keyphrase" (include "ssp.fullname" .) -}}
{{- $kp := include "ssp.persistedValue" (dict "context" . "secretName" $secretName "key" "keyphrase" "len" 48) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ssp.labels" . | nindent 4 }}
  annotations:
    # Rotating the keyphrase invalidates every in-flight password-reset token,
    # so preserve it across upgrades unless the user swaps existingSecret.
    helm.sh/resource-policy: keep
type: Opaque
data:
  keyphrase: {{ $kp | b64enc | quote }}
{{- end }}

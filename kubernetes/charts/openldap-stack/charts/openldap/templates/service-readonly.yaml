{{- if gt (int .Values.readOnlyReplicas.count) 0 -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openldap.readonlyFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: readonly
  {{- with .Values.readOnlyReplicas.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.readOnlyReplicas.service.type }}
  selector:
    {{- include "openldap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: readonly
  ports:
    - name: ldap
      port: {{ .Values.service.ldapPort }}
      targetPort: ldap
      protocol: TCP
    {{- if .Values.tls.enabled }}
    - name: ldaps
      port: {{ .Values.service.ldapsPort }}
      targetPort: ldaps
      protocol: TCP
    {{- end }}
    {{- if .Values.monitoring.enabled }}
    - name: metrics
      port: {{ .Values.monitoring.exporter.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openldap.readonlyHeadlessServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: readonly
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "openldap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: readonly
  ports:
    - name: ldap
      port: {{ .Values.service.ldapPort }}
      targetPort: ldap
      protocol: TCP
    {{- if .Values.tls.enabled }}
    - name: ldaps
      port: {{ .Values.service.ldapsPort }}
      targetPort: ldaps
      protocol: TCP
    {{- end }}
{{- end }}

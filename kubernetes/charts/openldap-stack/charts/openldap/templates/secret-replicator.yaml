{{- /*
Replicator password Secret — only rendered when replication is active
(mode != standalone) and the user has not pointed us at an existing Secret.
Password persists across upgrades via the same lookup + fallback pattern
as the admin secret.
*/ -}}
{{- if and (ne .Values.mode "standalone") (not .Values.replication.replicator.existingSecret) -}}
{{- $secretName := printf "%s-replicator" (include "openldap.fullname" .) -}}
{{- $pw := include "openldap.persistedPassword" (dict "context" . "secretName" $secretName "key" "replicator-password" "len" 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  replicator-password: {{ $pw | b64enc | quote }}
{{- end }}

{{- /*
Bootstrap ConfigMap — holds:
  * bootstrap.sh          — initContainer entrypoint (idempotent, mode-aware).
                            Standalone: seed cn=config + base data.
                            Mirror / multi-master: same, plus per-pod
                            olcServerID, olcMirrorMode: TRUE, syncrepl entries
                            towards every in-cluster peer + externalPeers, and
                            a replicator service account added to the tree.
  * slapd-config.ldif     — cn=config seed, Helm-templated for values-driven
                            knobs. Runtime placeholders substituted by
                            bootstrap.sh:
                              __ADMIN_PW_HASH__        (data admin)
                              __CONFIG_ADMIN_PW_HASH__ (cn=config admin)
                              __SERVER_ID_LINE__       (empty in standalone)
                              __MIRRORMODE_LINE__      (empty in standalone)
                              __SYNCREPL_BLOCK__       (empty in standalone)
  * base-data.ldif        — dc=<suffix> + OUs + (HA) replicator service
                            account. Loaded on ordinal 0 only when HA and
                            replication.seedOnOrdinalZeroOnly=true (default).
*/ -}}
{{- $ha := ne .Values.mode "standalone" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openldap.fullname" . }}-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu

    SLAPD_D=/etc/openldap/slapd.d
    MDB_DIR=/var/lib/openldap/openldap-data
    ACCESSLOG_DIR=/var/lib/openldap/accesslog-data
    OWNER="${OWNER_UID:-101}:${OWNER_GID:-102}"
    OK_MARKER="${SLAPD_D}/.bootstrap-ok"

    # Alpine base image — install slapd tools (idempotent, no-op if cached).
    if ! command -v slapadd >/dev/null 2>&1; then
      echo "[bootstrap] Installing packages: ${APK_PACKAGES}"
      apk add --no-cache ${APK_PACKAGES} >/dev/null
    fi

    # Derive ordinal from POD_NAME (StatefulSet pod names end in -N).
    ORDINAL=0
    if [ -n "${POD_NAME:-}" ]; then
      ORDINAL="${POD_NAME##*-}"
    fi
    echo "[bootstrap] mode=${MODE:-standalone} pod=${POD_NAME:-?} ordinal=${ORDINAL}"

    # Idempotence — a specific success marker is written LAST, so a partial
    # bootstrap (e.g. slapadd failure mid-run) does not lock subsequent
    # restarts into skipping. If cn=config exists but the marker is missing,
    # wipe partial state and re-bootstrap from scratch.
    if [ -f "${OK_MARKER}" ]; then
      echo "[bootstrap] Marker present — already bootstrapped, skipping."
      chown -R "${OWNER}" "${SLAPD_D}" "${MDB_DIR}" "${ACCESSLOG_DIR}"
      exit 0
    fi

    if [ -d "${SLAPD_D}" ] && [ -n "$(ls -A ${SLAPD_D} 2>/dev/null)" ]; then
      echo "[bootstrap] Partial state detected (no success marker) — wiping and restarting."
      rm -rf "${SLAPD_D}"/* "${MDB_DIR}"/* "${ACCESSLOG_DIR}"/* 2>/dev/null || true
    fi

    if [ ! -f /secrets/admin-password ] || [ ! -f /secrets/config-admin-password ]; then
      echo "[bootstrap] Admin secrets missing under /secrets" >&2
      exit 1
    fi

    ADMIN_HASH=$(slappasswd -s "$(cat /secrets/admin-password)")
    CONFIG_HASH=$(slappasswd -s "$(cat /secrets/config-admin-password)")

    # -------- HA-specific: server ID + syncrepl block + replicator hash. -----
    SERVER_ID_LINE=""
    MIRRORMODE_LINE=""
    SYNCREPL_FILE=""
    REPLICATOR_HASH=""

    if [ "${MODE:-standalone}" != "standalone" ]; then
      if [ ! -f /replicator/replicator-password ]; then
        echo "[bootstrap] Replicator secret missing under /replicator" >&2
        exit 1
      fi
      REPLICATOR_PW=$(cat /replicator/replicator-password)
      REPLICATOR_HASH=$(slappasswd -s "$REPLICATOR_PW")

      # Read-only consumer pods use a distinct serverIdBase and never accept
      # writes — olcReadOnly: TRUE substitutes olcMirrorMode.
      if [ "${NODE_ROLE:-writable}" = "readonly" ]; then
        SERVER_ID=$((${READONLY_SERVER_ID_BASE:-100} + ORDINAL))
        SERVER_ID_LINE="olcServerID: ${SERVER_ID}"
        if [ "${READONLY_ENFORCE:-true}" = "true" ]; then
          MIRRORMODE_LINE="olcReadOnly: TRUE"
        else
          MIRRORMODE_LINE=""
        fi
      else
        SERVER_ID=$((${SERVER_ID_BASE:-1} + ORDINAL))
        SERVER_ID_LINE="olcServerID: ${SERVER_ID}"
        MIRRORMODE_LINE="olcMirrorMode: TRUE"
      fi

      # Build peer URI list.
      #   writable: every in-cluster writable pod + external peers (mesh)
      #   readonly: only writable pods (RO does not consume from RO)
      # Peer FQDN follows the StatefulSet + headless service convention:
      #   <sts-name>-<i>.<headless>.<ns>.svc.cluster.local
      PEERS=""
      i=0
      while [ "$i" -lt "${REPLICA_COUNT}" ]; do
        PEERS="${PEERS} ldap://${SVC_NAME}-${i}.${HEADLESS_SVC}.${NAMESPACE}.svc.cluster.local:${REPLICA_LDAP_PORT}"
        i=$((i + 1))
      done
      if [ -n "${EXTERNAL_PEERS:-}" ] && [ "${NODE_ROLE:-writable}" = "writable" ]; then
        OLDIFS=$IFS
        IFS=,
        for p in $EXTERNAL_PEERS; do
          [ -n "$p" ] && PEERS="${PEERS} ${p}"
        done
        IFS=$OLDIFS
      fi

      # Emit one olcSyncRepl entry per peer. rid must be unique per replica.
      SYNCREPL_FILE=$(mktemp)
      RID=1
      for uri in $PEERS; do
        RID_PADDED=$(printf '%03d' "$RID")
        cat >> "$SYNCREPL_FILE" <<EOF
    olcSyncRepl: rid=${RID_PADDED} provider=${uri}
      bindmethod=simple binddn="${REPLICATOR_DN}"
      credentials="${REPLICATOR_PW}"
      searchbase="${SUFFIX}"
      type=refreshAndPersist retry="${SYNCREPL_RETRY}"
      timeout=1 schemachecking=on
      logbase="cn=accesslog"
      logfilter="(&(objectClass=auditWriteObject)(reqResult=0))"
      syncdata=accesslog
    EOF
        RID=$((RID + 1))
      done
      echo "[bootstrap] built $(($RID - 1)) syncrepl providers, serverID=${SERVER_ID}"
    fi

    mkdir -p "${SLAPD_D}" "${MDB_DIR}" "${ACCESSLOG_DIR}"

    # Render cn=config with password hashes and HA markers.
    RENDERED_CONFIG=$(mktemp)
    RENDERED_DATA=$(mktemp)
    trap 'rm -f "${RENDERED_CONFIG}" "${RENDERED_DATA}" "${SYNCREPL_FILE:-}"' EXIT

    # Build a sed script file — safer than shell word-splitting when
    # substitution values contain spaces (e.g. "olcServerID: 1").
    SED_SCRIPT=$(mktemp)
    {
      printf 's|__ADMIN_PW_HASH__|%s|\n' "${ADMIN_HASH}"
      printf 's|__CONFIG_ADMIN_PW_HASH__|%s|\n' "${CONFIG_HASH}"
      printf 's|__SERVER_ID_LINE__|%s|\n' "${SERVER_ID_LINE}"
      printf 's|__MIRRORMODE_LINE__|%s|\n' "${MIRRORMODE_LINE}"
    } > "${SED_SCRIPT}"

    # Multi-line SYNCREPL block is inserted via awk (sed multiline is not portable).
    if [ -n "${SYNCREPL_FILE}" ] && [ -s "${SYNCREPL_FILE}" ]; then
      awk -v f="${SYNCREPL_FILE}" '
        /__SYNCREPL_BLOCK__/ {
          while ((getline line < f) > 0) print line
          close(f)
          next
        }
        { print }
      ' /bootstrap/slapd-config.ldif | sed -f "${SED_SCRIPT}" > "${RENDERED_CONFIG}"
    else
      { printf '/__SYNCREPL_BLOCK__/d\n'; cat "${SED_SCRIPT}"; } > "${SED_SCRIPT}.full"
      sed -f "${SED_SCRIPT}.full" /bootstrap/slapd-config.ldif > "${RENDERED_CONFIG}"
      rm -f "${SED_SCRIPT}.full"
    fi
    rm -f "${SED_SCRIPT}"

    # Custom schemas — append `include:` lines to the cn=schema block right
    # before slapadd. Files come from /custom-schemas (projected volume
    # combining the chart-managed ConfigMap and any user existingConfigMap).
    if [ -d /custom-schemas ]; then
      CUSTOM_SCHEMAS=""
      for f in /custom-schemas/*.ldif; do
        [ -f "$f" ] || continue
        CUSTOM_SCHEMAS="${CUSTOM_SCHEMAS}include: file://$f\n"
      done
      if [ -n "${CUSTOM_SCHEMAS}" ]; then
        echo "[bootstrap] Injecting $(ls /custom-schemas/*.ldif 2>/dev/null | wc -l) custom schema file(s)"
        # Insert AFTER the last built-in `include:` line inside cn=schema.
        awk -v extra="$(printf '%b' "${CUSTOM_SCHEMAS}")" '
          /^include: file:\/\/\/etc\/openldap\/schema/ { last=NR; buf[NR]=$0; next }
          { buf[NR]=$0 }
          END {
            for (i=1;i<=NR;i++) {
              print buf[i]
              if (i==last) printf "%s", extra
            }
          }
        ' "${RENDERED_CONFIG}" > "${RENDERED_CONFIG}.tmp" && mv "${RENDERED_CONFIG}.tmp" "${RENDERED_CONFIG}"
      fi
    fi

    echo "[bootstrap] Loading cn=config"
    slapadd -n 0 -F "${SLAPD_D}" -l "${RENDERED_CONFIG}"

    # Base data: standalone always, HA only on ordinal 0 (default) so peers
    # sync from ordinal 0 instead of concurrently seeding split-brain state.
    # Read-only pods NEVER seed — they only pull from writable peers.
    SHOULD_SEED_DATA=1
    if [ "${MODE:-standalone}" != "standalone" ] \
       && [ "${SEED_ORDINAL_ZERO_ONLY:-true}" = "true" ] \
       && [ "${ORDINAL}" != "0" ]; then
      SHOULD_SEED_DATA=0
    fi
    if [ "${NODE_ROLE:-writable}" = "readonly" ]; then
      SHOULD_SEED_DATA=0
    fi

    if [ "${SHOULD_SEED_DATA}" = "1" ]; then
      # Substitute replicator hash into base data (empty in standalone → the
      # replicator entry is stripped by the ${REPLICATOR_HASH:+…} guard in the
      # template).
      sed -e "s|__REPLICATOR_PW_HASH__|${REPLICATOR_HASH}|" \
          /bootstrap/base-data.ldif > "${RENDERED_DATA}"
      echo "[bootstrap] Loading base directory data"
      slapadd -n 1 -F "${SLAPD_D}" -l "${RENDERED_DATA}"

      # Custom data LDIFs — same seed pod, alphabetical order, one slapadd
      # per file so a bad LDIF only wastes its own file rather than the
      # whole batch. Files come from /custom-ldifs (projected volume).
      if [ -d /custom-ldifs ]; then
        for f in $(ls /custom-ldifs/*.ldif 2>/dev/null | sort); do
          echo "[bootstrap] Loading custom LDIF $(basename "$f")"
          slapadd -n 1 -F "${SLAPD_D}" -l "$f"
        done
      fi
    else
      echo "[bootstrap] ordinal=${ORDINAL} — skipping base data seed (will sync from ordinal 0)"
    fi

    echo "[bootstrap] chown -R ${OWNER}"
    chown -R "${OWNER}" "${SLAPD_D}" "${MDB_DIR}" "${ACCESSLOG_DIR}"

    # Success marker — written LAST so a partial bootstrap forces a redo.
    date -u +%Y-%m-%dT%H:%M:%SZ > "${OK_MARKER}"
    chown "${OWNER}" "${OK_MARKER}"

    echo "[bootstrap] Done."

  slapd-config.ldif: |
    dn: cn=config
    objectClass: olcGlobal
    cn: config
    olcPidFile: /run/openldap/slapd.pid
    olcArgsFile: /run/openldap/slapd.args
    {{- if .Values.tls.enabled }}
    olcTLSCACertificateFile: /etc/openldap/certs/ca.crt
    olcTLSCertificateFile: /etc/openldap/certs/tls.crt
    olcTLSCertificateKeyFile: /etc/openldap/certs/tls.key
    olcTLSVerifyClient: never
    {{- end }}
    {{- if gt (int .Values.tls.minSSF) 0 }}
    olcSecurity: ssf={{ .Values.tls.minSSF }}
    {{- end }}
    {{- if .Values.tls.disallowPlainBind }}
    olcDisallows: bind_anon
    {{- end }}
    __SERVER_ID_LINE__

    dn: cn=module{{ "{" }}0{{ "}" }},cn=config
    objectClass: olcModuleList
    cn: module{{ "{" }}0{{ "}" }}
    olcModulePath: /usr/lib/openldap
    olcModuleLoad: back_mdb.so
    olcModuleLoad: memberof.so
    olcModuleLoad: refint.so
    olcModuleLoad: ppolicy.so
    olcModuleLoad: dynlist.so
    olcModuleLoad: accesslog.so
    {{- if $ha }}
    olcModuleLoad: syncprov.so
    {{- end }}

    dn: cn=schema,cn=config
    objectClass: olcSchemaConfig
    cn: schema

    include: file:///etc/openldap/schema/core.ldif
    {{- range .Values.directory.schemas }}
    include: file:///etc/openldap/schema/{{ . }}.ldif
    {{- end }}

    dn: olcDatabase={{ "{" }}-1{{ "}" }}frontend,cn=config
    objectClass: olcDatabaseConfig
    objectClass: olcFrontendConfig
    olcDatabase: {{ "{" }}-1{{ "}" }}frontend

    dn: olcDatabase={{ "{" }}0{{ "}" }}config,cn=config
    objectClass: olcDatabaseConfig
    olcDatabase: {{ "{" }}0{{ "}" }}config
    olcRootDN: {{ .Values.configAdmin.bindDN }}
    olcRootPW: __CONFIG_ADMIN_PW_HASH__
    olcAccess: {{ "{" }}0{{ "}" }}to * by dn.exact="{{ .Values.configAdmin.bindDN }}" manage by * none

    dn: olcDatabase={{ "{" }}1{{ "}" }}mdb,cn=config
    objectClass: olcDatabaseConfig
    objectClass: olcMdbConfig
    olcDatabase: {{ "{" }}1{{ "}" }}mdb
    olcSuffix: {{ .Values.directory.suffix }}
    olcDbDirectory: /var/lib/openldap/openldap-data
    olcRootDN: {{ .Values.admin.bindDN }}
    olcRootPW: __ADMIN_PW_HASH__
    olcDbMaxSize: {{ int64 .Values.database.main.maxSizeBytes }}
    olcDbIndex: objectClass eq
    olcDbIndex: cn,sn,uid eq,pres,sub
    olcDbIndex: mail eq,sub
    olcDbIndex: member eq
    olcDbIndex: memberOf eq
    {{- if has "nis" .Values.directory.schemas }}
    olcDbIndex: uidNumber,gidNumber eq
    {{- end }}
    {{- if $ha }}
    olcDbIndex: entryCSN,entryUUID eq
    {{- end }}
    olcMonitoring: TRUE
    {{- /*
      ACL block on {1}mdb — either the user-provided customAcls (full
      replacement) or the chart defaults + any extraAcls (append). Every
      entry is `tpl`-rendered so users can reference values.
    */ -}}
    {{- $acls := .Values.customAcls -}}
    {{- if not $acls -}}
      {{- $acls = list -}}
      {{- $adminDN := .Values.admin.bindDN -}}
      {{- $suffix  := .Values.directory.suffix -}}
      {{- $replDN  := "" -}}
      {{- if $ha }}{{- $replDN = printf "%s,%s" .Values.replication.replicator.dn .Values.directory.suffix -}}{{- end }}
      {{- $acls = append $acls (printf `to attrs=userPassword by self write by dn.exact="%s" write %sby anonymous auth by * none` $adminDN (ternary (printf `by dn.exact="%s" read ` $replDN) "" $ha)) -}}
      {{- $acls = append $acls (printf `to dn.subtree="ou=policies,%s" by * read` $suffix) -}}
      {{- $acls = append $acls (printf `to dn.subtree="%s" by dn.exact="%s" write %sby users read by * none` $suffix $adminDN (ternary (printf `by dn.exact="%s" read ` $replDN) "" $ha)) -}}
      {{- range .Values.extraAcls -}}
        {{- $acls = append $acls . -}}
      {{- end -}}
    {{- end }}
    {{- range $i, $rule := $acls }}
    olcAccess: {{ printf "{%d}" $i }}{{ tpl $rule $ }}
    {{- end }}
    __SYNCREPL_BLOCK__
    __MIRRORMODE_LINE__
    {{ if $ha }}
    dn: olcOverlay=syncprov,olcDatabase={{ "{" }}1{{ "}" }}mdb,cn=config
    objectClass: olcOverlayConfig
    objectClass: olcSyncProvConfig
    olcOverlay: syncprov
    olcSpCheckpoint: {{ .Values.replication.syncprov.checkpoint }}
    olcSpSessionLog: {{ .Values.replication.syncprov.sessionLog }}
    {{ end }}
    dn: olcOverlay=memberof,olcDatabase={{ "{" }}1{{ "}" }}mdb,cn=config
    objectClass: olcOverlayConfig
    objectClass: olcMemberOf
    olcOverlay: memberof
    olcMemberOfRefInt: TRUE
    olcMemberOfGroupOC: groupOfNames
    olcMemberOfMemberAD: member
    olcMemberOfMemberOfAD: memberOf

    dn: olcOverlay=refint,olcDatabase={{ "{" }}1{{ "}" }}mdb,cn=config
    objectClass: olcOverlayConfig
    objectClass: olcRefintConfig
    olcOverlay: refint
    olcRefintAttribute: uniqueMember
    olcRefintAttribute: member
    olcRefintAttribute: memberOf
    {{ if .Values.ppolicy.enabled }}
    dn: olcOverlay=ppolicy,olcDatabase={{ "{" }}1{{ "}" }}mdb,cn=config
    objectClass: olcOverlayConfig
    objectClass: olcPPolicyConfig
    olcOverlay: ppolicy
    olcPPolicyDefault: {{ .Values.ppolicy.defaultPolicyRDN }},ou=policies,{{ .Values.directory.suffix }}
    olcPPolicyHashCleartext: {{ ternary "TRUE" "FALSE" .Values.ppolicy.hashCleartext }}
    {{ end }}
    dn: olcOverlay=dynlist,olcDatabase={{ "{" }}1{{ "}" }}mdb,cn=config
    objectClass: olcOverlayConfig
    objectClass: olcDynListConfig
    olcOverlay: dynlist
    olcDynListAttrSet: groupOfUrls memberURL member+memberOf@groupOfNames

    dn: olcDatabase={{ "{" }}2{{ "}" }}mdb,cn=config
    objectClass: olcDatabaseConfig
    objectClass: olcMdbConfig
    olcDatabase: {{ "{" }}2{{ "}" }}mdb
    olcSuffix: cn=accesslog
    olcDbDirectory: /var/lib/openldap/accesslog-data
    olcRootDN: {{ .Values.configAdmin.bindDN }}
    olcDbMaxSize: {{ int64 .Values.database.accesslog.maxSizeBytes }}
    olcDbIndex: reqStart eq
    olcDbIndex: reqDN eq
    olcDbIndex: reqType eq
    olcDbIndex: reqResult eq
    {{- if $ha }}
    olcDbIndex: entryCSN,entryUUID,objectClass,reqEnd eq
    {{- end }}
    olcAccess: {{ "{" }}0{{ "}" }}to * by dn.exact="{{ .Values.configAdmin.bindDN }}" read {{ if $ha }}by dn.exact="{{ .Values.replication.replicator.dn }},{{ .Values.directory.suffix }}" read {{ end }}by * none
    {{ if $ha }}
    dn: olcOverlay=syncprov,olcDatabase={{ "{" }}2{{ "}" }}mdb,cn=config
    objectClass: olcOverlayConfig
    objectClass: olcSyncProvConfig
    olcOverlay: syncprov
    olcSpNoPresent: TRUE
    olcSpReloadHint: TRUE
    {{ end }}
    dn: olcOverlay=accesslog,olcDatabase={{ "{" }}1{{ "}" }}mdb,cn=config
    objectClass: olcOverlayConfig
    objectClass: olcAccessLogConfig
    olcOverlay: accesslog
    olcAccessLogDB: cn=accesslog
    olcAccessLogOps: {{ if $ha }}writes{{ else }}{{ .Values.accesslog.ops }}{{ end }}
    olcAccessLogSuccess: {{ if $ha }}TRUE{{ else }}{{ ternary "TRUE" "FALSE" .Values.accesslog.logSuccess }}{{ end }}
    olcAccessLogPurge: {{ .Values.accesslog.purge }}

    dn: olcDatabase={{ "{" }}3{{ "}" }}monitor,cn=config
    objectClass: olcDatabaseConfig
    objectClass: olcMonitorConfig
    olcDatabase: {{ "{" }}3{{ "}" }}monitor
    olcAccess: {{ "{" }}0{{ "}" }}to dn.subtree="cn=Monitor" by dn.exact="{{ .Values.configAdmin.bindDN }}" read by * none
    olcMonitoring: TRUE

  base-data.ldif: |
    dn: {{ .Values.directory.suffix }}
    objectClass: top
    objectClass: dcObject
    objectClass: organization
    o: {{ .Values.directory.organization }}
    dc: {{ (split "," .Values.directory.suffix)._0 | trimPrefix "dc=" }}
    {{- if .Values.directory.description }}
    description: {{ .Values.directory.description }}
    {{- end }}
    {{ range .Values.directory.organizationalUnits }}
    dn: ou={{ . }},{{ $.Values.directory.suffix }}
    objectClass: organizationalUnit
    ou: {{ . }}
    {{ end }}
    {{- if $ha }}
    dn: {{ .Values.replication.replicator.dn }},{{ .Values.directory.suffix }}
    objectClass: inetOrgPerson
    cn: {{ (split "," .Values.replication.replicator.dn)._0 | trimPrefix "cn=" }}
    sn: replicator
    userPassword: __REPLICATOR_PW_HASH__
    description: Delta-syncrepl bind account for peer-to-peer replication.
    {{- end }}

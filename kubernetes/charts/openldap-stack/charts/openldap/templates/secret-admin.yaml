{{- /*
Admin passwords Secret.

- Skipped entirely when the user provides admin.existingSecret — in that case
  the Secret must exist beforehand and carry both `admin-password` and
  `config-admin-password` keys.
- Otherwise: generated once on first install, then preserved on upgrade via
  `lookup`. Random funcs re-roll every render — the lookup + fallback pattern
  is what makes the value stable.
*/ -}}
{{- if not .Values.admin.existingSecret -}}
{{- $secretName := printf "%s-admin" (include "openldap.fullname" .) -}}
{{- $adminPw := include "openldap.persistedPassword" (dict "context" . "secretName" $secretName "key" "admin-password" "len" 32) -}}
{{- $configAdminPw := include "openldap.persistedPassword" (dict "context" . "secretName" $secretName "key" "config-admin-password" "len" 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
  annotations:
    # Keep the Secret across `helm uninstall` so re-install of the same release
    # name preserves passwords (avoids accidentally rotating credentials that
    # downstream systems already store).
    helm.sh/resource-policy: keep
type: Opaque
data:
  admin-password: {{ $adminPw | b64enc | quote }}
  config-admin-password: {{ $configAdminPw | b64enc | quote }}
{{- end }}

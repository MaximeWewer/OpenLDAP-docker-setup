{{- /*
Shell scripts used by the sync Jobs. All three (ppolicy / users / groups)
share the same base image (alpine) and the same tooling boot: apk install,
download openldap-cli + kubectl, then run one of the scripts below.

Each script is idempotent â€” safe to re-run on every `helm upgrade`.
*/ -}}
{{- if or .Values.users .Values.groups .Values.policies .Values.acls .Values.treeGrants .Values.overlays .Values.backup.enabled .Values.accesslogPurgeJob.enabled .Values.aclLintCronJob.enabled -}}
{{- $suffix := .Values.directory.suffix -}}
{{- $userOU := "ou=users" -}}
{{- $groupOU := "ou=groups" -}}
{{- $policyOU := "ou=policies" -}}
{{- $mailDomain := printf "%s.%s" (index (splitList "," $suffix) 0 | trimPrefix "dc=") (index (splitList "," $suffix) 1 | trimPrefix "dc=") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openldap.fullname" . }}-sync-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openldap.labels" . | nindent 4 }}
    app.kubernetes.io/component: sync
data:

  # ---------------------------------------------------------------------------
  # common.sh â€” sourced by every sync script.
  #   * installs runtime tools (openldap-cli, kubectl, curl, jq)
  #   * writes ~/.openldap-cli.yaml with the release's admin binding
  #   * waits for LDAP to accept binds
  # ---------------------------------------------------------------------------
  common.sh: |
    #!/bin/sh
    set -eu

    LOG() { printf '[sync] %s\n' "$*"; }
    DIE() { printf '[sync] ERROR: %s\n' "$*" >&2; exit 1; }

    : "${LDAP_URL:?}"; : "${LDAP_BASE_DN:?}"; : "${LDAP_BIND_DN:?}"
    : "${LDAP_USER_OU:?}"; : "${LDAP_GROUP_OU:?}"; : "${LDAP_POLICY_OU:?}"
    : "${LDAP_MAIL_DOMAIN:?}"; : "${CLI_VERSION:?}"; : "${CLI_DOWNLOAD_URL:?}"
    : "${KUBECTL_VERSION:?}"
    [ -f /secrets/admin-password ] || DIE "admin password missing at /secrets/admin-password"
    LDAP_BIND_PW="$(cat /secrets/admin-password)"; export LDAP_BIND_PW

    if ! command -v openldap-cli >/dev/null 2>&1; then
      LOG "Installing tooling (apk + openldap-cli ${CLI_VERSION} + kubectl ${KUBECTL_VERSION})"
      # Retry apk â€” mirrors are occasionally slow / transiently unreachable.
      APK_TRIES=0
      until apk add --no-cache curl ca-certificates jq openssl >/dev/null 2>&1; do
        APK_TRIES=$((APK_TRIES + 1))
        [ "$APK_TRIES" -ge 5 ] && DIE "apk add failed after 5 attempts"
        LOG "apk add: transient failure (try ${APK_TRIES}/5), retrying in 5s"
        sleep 5
      done
      TARBALL="openldap-cli_${CLI_VERSION}_linux_amd64.tar.gz"
      curl --retry 3 --retry-delay 3 -fsSL "${CLI_DOWNLOAD_URL}/${CLI_VERSION}/${TARBALL}" -o /tmp/cli.tgz
      tar -xzf /tmp/cli.tgz -C /usr/local/bin openldap-cli
      chmod +x /usr/local/bin/openldap-cli
      curl --retry 3 --retry-delay 3 -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
      chmod +x /usr/local/bin/kubectl
      rm -f /tmp/cli.tgz
    fi

    # Prefer flags + env over the config file (LDAP_* env vars are honoured
    # natively by the CLI). Still write a config file so future ad-hoc `kubectl
    # exec` sessions in the Job's pod work without env plumbing.
    umask 077
    mkdir -p /root
    cat > /root/.openldap-cli.yaml <<EOF
    default: helm
    profiles:
      helm:
        url: ${LDAP_URL}
        base_dn: ${LDAP_BASE_DN}
        bind_dn: ${LDAP_BIND_DN}
        user_ou: ${LDAP_USER_OU}
        group_ou: ${LDAP_GROUP_OU}
        policy_ou: ${LDAP_POLICY_OU}
        mail_domain: ${LDAP_MAIL_DOMAIN}
    EOF

    wait_for_ldap() {
      end=$(( $(date +%s) + ${WAIT_TIMEOUT_SECONDS:-180} ))
      while [ "$(date +%s)" -lt "$end" ]; do
        if openldap-cli whoami >/dev/null 2>&1; then
          LOG "LDAP reachable, bind OK"
          return 0
        fi
        sleep "${WAIT_INTERVAL_SECONDS:-3}"
      done
      DIE "LDAP not reachable within ${WAIT_TIMEOUT_SECONDS:-180}s"
    }

    # -------------------------------------------------------------------------
    # Secret helpers (backend=kubernetes).
    # -------------------------------------------------------------------------
    secret_name_for_user() { printf '%s-user-%s' "${RELEASE_FULLNAME}" "$1"; }

    secret_password_exists() {
      kubectl -n "${RELEASE_NAMESPACE}" get secret "$(secret_name_for_user "$1")" >/dev/null 2>&1
    }

    secret_password_get() {
      kubectl -n "${RELEASE_NAMESPACE}" get secret "$(secret_name_for_user "$1")" \
        -o jsonpath='{.data.password}' 2>/dev/null | base64 -d
    }

    secret_password_put() {
      local uid="$1" pw="$2" name
      name="$(secret_name_for_user "$uid")"
      kubectl -n "${RELEASE_NAMESPACE}" create secret generic "$name" \
        --from-literal=password="$pw" \
        --dry-run=client -o yaml \
        | kubectl label -f - --local -o yaml \
            "app.kubernetes.io/managed-by=Helm" \
            "app.kubernetes.io/component=user-credentials" \
            "app.kubernetes.io/part-of=openldap-stack" \
            "openldap.stack/release=${RELEASE_NAME}" \
            "openldap.stack/user=${uid}" \
        | kubectl apply -f - >/dev/null
    }

    secret_password_delete() {
      kubectl -n "${RELEASE_NAMESPACE}" delete secret "$(secret_name_for_user "$1")" \
        --ignore-not-found=true >/dev/null
    }

    gen_password() { openssl rand -base64 24 | tr -d '=/+' | head -c 24; }

    # -------------------------------------------------------------------------
    # cn=config bind â€” required by acls / tree-grants / overlays / acl-lint.
    # Sourced only when the caller sets `NEED_CONFIG_BIND=1` to keep other
    # scripts on the plain admin bind.
    # -------------------------------------------------------------------------
    load_config_bind() {
      [ -f /secrets/config-admin-password ] \
        || DIE "config admin password missing at /secrets/config-admin-password"
      LDAP_CONFIG_BIND_DN="${LDAP_CONFIG_BIND_DN:-cn=adminconfig,cn=config}"
      LDAP_CONFIG_BIND_PW="$(cat /secrets/config-admin-password)"
      export LDAP_CONFIG_BIND_DN LDAP_CONFIG_BIND_PW
    }

    # -------------------------------------------------------------------------
    # Chart state ConfigMap helpers â€” used by acls / tree-grants / overlays
    # to track their previously-applied set across upgrades. Data key = phase
    # name (acls | tree-grants | overlays).
    # -------------------------------------------------------------------------
    STATE_CM_NAME="${RELEASE_FULLNAME}-sync-state"

    state_get() {
      # $1 = data key; prints the JSON body (or "[]" if absent)
      kubectl -n "${RELEASE_NAMESPACE}" get configmap "${STATE_CM_NAME}" \
        -o "jsonpath={.data.$1}" 2>/dev/null | { read -r v; printf '%s' "${v:-[]}"; }
    }

    state_put() {
      # $1 = data key, $2 = path to new JSON file
      if ! kubectl -n "${RELEASE_NAMESPACE}" get configmap "${STATE_CM_NAME}" >/dev/null 2>&1; then
        kubectl -n "${RELEASE_NAMESPACE}" create configmap "${STATE_CM_NAME}" \
          --from-literal="$1=$(cat "$2")" >/dev/null
        kubectl -n "${RELEASE_NAMESPACE}" label configmap "${STATE_CM_NAME}" \
          --overwrite \
          "app.kubernetes.io/managed-by=Helm" \
          "app.kubernetes.io/component=sync-state" \
          "app.kubernetes.io/part-of=openldap-stack" \
          "openldap.stack/release=${RELEASE_NAME}" >/dev/null
      else
        kubectl -n "${RELEASE_NAMESPACE}" patch configmap "${STATE_CM_NAME}" \
          --type=merge -p "$(jq -n --arg k "$1" --rawfile v "$2" '{data:{($k):$v}}')" >/dev/null
      fi
    }

  # ---------------------------------------------------------------------------
  # ppolicy.sh â€” reconciles ppolicy templates under ou=policies.
  # ---------------------------------------------------------------------------
  ppolicy.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap

    [ -f /spec/policies.json ] || { LOG "no policies to reconcile"; exit 0; }
    COUNT=$(jq 'length' /spec/policies.json)
    LOG "reconciling ${COUNT} ppolicy template(s)"

    i=0
    while [ "$i" -lt "$COUNT" ]; do
      NAME=$(jq -r ".[$i].cn" /spec/policies.json)
      [ -n "$NAME" ] && [ "$NAME" != "null" ] || DIE "policy #$i has no cn"

      # Build --flag=value list from every remaining key.
      FLAGS=$(jq -r --argjson i "$i" '
        .[$i] | to_entries | map(select(.key != "cn"))
              | map("--" + .key + "=" + (.value | tostring)) | join(" ")
      ' /spec/policies.json)

      LOG "ppolicy set ${NAME} ${FLAGS}"
      # shellcheck disable=SC2086
      openldap-cli ppolicy set "${NAME}" ${FLAGS}
      i=$((i + 1))
    done
    LOG "ppolicy sync done"

  # ---------------------------------------------------------------------------
  # users.sh â€” reconciles users under ou=users.
  #   * create-or-update every user in values.users
  #   * store generated passwords in per-user Secrets (kubernetes backend)
  #   * on removal from values.users, either delete or lock based on
  #     onUserRemove
  # ---------------------------------------------------------------------------
  users.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap

    [ -f /spec/users.json ] || { LOG "no users to reconcile"; }
    COUNT=$(jq 'length' /spec/users.json 2>/dev/null || echo 0)
    LOG "reconciling ${COUNT} user(s)"

    # Track which uids we own (from values) â€” used later for drift cleanup.
    DECLARED=/tmp/declared-users.txt
    : > "$DECLARED"

    i=0
    while [ "$i" -lt "$COUNT" ]; do
      UID_VAL=$(jq -r ".[$i].uid" /spec/users.json)
      [ -n "$UID_VAL" ] && [ "$UID_VAL" != "null" ] || DIE "user #$i has no uid"
      echo "$UID_VAL" >> "$DECLARED"

      GIVEN=$(jq -r ".[$i].givenName // empty" /spec/users.json)
      SN=$(jq -r ".[$i].sn // empty" /spec/users.json)
      MAIL=$(jq -r ".[$i].mail // empty" /spec/users.json)
      DISPLAY=$(jq -r ".[$i].displayName // empty" /spec/users.json)
      POLICY=$(jq -r ".[$i].policy // empty" /spec/users.json)
      EXISTING_SECRET=$(jq -r ".[$i].existingSecret // empty" /spec/users.json)

      # Extra attrs to pass as repeated `--set k=v`.
      EXTRA_KV=$(jq -r --argjson i "$i" '
        (.[$i].attrs // {}) | to_entries[] | (.key + "=" + (.value | tostring))
      ' /spec/users.json 2>/dev/null || true)

      if openldap-cli user info "$UID_VAL" >/dev/null 2>&1; then
        LOG "user ${UID_VAL}: exists â€” reconciling attributes"
        [ -n "$GIVEN" ]   && openldap-cli user set "$UID_VAL" givenName "$GIVEN"
        [ -n "$SN" ]      && openldap-cli user set "$UID_VAL" sn "$SN"
        [ -n "$MAIL" ]    && openldap-cli user set "$UID_VAL" mail "$MAIL"
        [ -n "$DISPLAY" ] && openldap-cli user set "$UID_VAL" displayName "$DISPLAY"
        for kv in $EXTRA_KV; do
          K=${kv%%=*}; V=${kv#*=}
          openldap-cli user set "$UID_VAL" "$K" "$V"
        done
      else
        LOG "user ${UID_VAL}: creating"
        # Determine password source.
        if [ -n "$EXISTING_SECRET" ]; then
          PW=$(kubectl -n "${RELEASE_NAMESPACE}" get secret "$EXISTING_SECRET" \
                 -o jsonpath='{.data.password}' | base64 -d)
          [ -n "$PW" ] || DIE "existingSecret ${EXISTING_SECRET} has no data.password"
        elif secret_password_exists "$UID_VAL"; then
          # A Secret survived from a previous install; reuse it.
          PW=$(secret_password_get "$UID_VAL")
        else
          PW=$(gen_password)
        fi

        # Build `--set k=v` pairs â€” repeated flag, space-separated args.
        set -- "$UID_VAL" --password "$PW"
        [ -n "$GIVEN" ]   && set -- "$@" --set "givenName=$GIVEN"
        [ -n "$SN" ]      && set -- "$@" --set "sn=$SN"
        [ -n "$MAIL" ]    && set -- "$@" --set "mail=$MAIL"
        [ -n "$DISPLAY" ] && set -- "$@" --set "displayName=$DISPLAY"
        for kv in $EXTRA_KV; do
          set -- "$@" --set "$kv"
        done
        openldap-cli user add "$@"

        # Persist password ONLY when the chart owns it (no existingSecret).
        if [ -z "$EXISTING_SECRET" ]; then
          secret_password_put "$UID_VAL" "$PW"
        fi
      fi

      if [ -n "$POLICY" ]; then
        LOG "user ${UID_VAL}: ppolicy assign ${POLICY}"
        openldap-cli ppolicy assign "$UID_VAL" "$POLICY"
      fi

      i=$((i + 1))
    done

    # Drift: any user with the label openldap.stack/release=${RELEASE_NAME}
    # (i.e. previously created by this chart) that is no longer declared â†’
    # delete or lock per onUserRemove.
    LOG "checking drift â€” onUserRemove=${ON_USER_REMOVE}"
    KNOWN=$(kubectl -n "${RELEASE_NAMESPACE}" get secrets \
              -l "openldap.stack/release=${RELEASE_NAME},app.kubernetes.io/component=user-credentials" \
              -o jsonpath='{range .items[*]}{.metadata.labels.openldap\.stack/user}{"\n"}{end}' \
              2>/dev/null | sort -u)
    for uid in $KNOWN; do
      if ! grep -Fxq "$uid" "$DECLARED"; then
        case "$ON_USER_REMOVE" in
          delete)
            LOG "drift: deleting user ${uid} + its Secret"
            openldap-cli user delete "$uid" || true
            secret_password_delete "$uid"
            ;;
          lock)
            LOG "drift: locking user ${uid} (pwdAccountLockedTime)"
            openldap-cli user set "$uid" pwdAccountLockedTime 000001010000Z || true
            ;;
          *)
            DIE "onUserRemove=${ON_USER_REMOVE}: expected delete|lock"
            ;;
        esac
      fi
    done
    LOG "users sync done"

  # ---------------------------------------------------------------------------
  # groups.sh â€” reconciles groupOfNames entries under ou=groups.
  # ---------------------------------------------------------------------------
  groups.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap

    [ -f /spec/groups.json ] || { LOG "no groups to reconcile"; exit 0; }
    COUNT=$(jq 'length' /spec/groups.json)
    LOG "reconciling ${COUNT} group(s)"

    DECLARED=/tmp/declared-groups.txt
    : > "$DECLARED"

    i=0
    while [ "$i" -lt "$COUNT" ]; do
      CN=$(jq -r ".[$i].cn" /spec/groups.json)
      [ -n "$CN" ] && [ "$CN" != "null" ] || DIE "group #$i has no cn"
      echo "$CN" >> "$DECLARED"

      MEMBERS=$(jq -r ".[$i].members[]?" /spec/groups.json)
      [ -n "$MEMBERS" ] || DIE "group ${CN} has no members (groupOfNames requires â‰Ą 1)"

      DESC=$(jq -r ".[$i].description // empty" /spec/groups.json)

      if openldap-cli group info "$CN" >/dev/null 2>&1; then
        LOG "group ${CN}: exists â€” reconciling members"
        # Current members: extract UID (RDN value) from each member DN
        # (member: cn=alice,ou=users,...).
        CURRENT=$(openldap-cli group info "$CN" -o json 2>/dev/null \
          | jq -r '.attrs.member[]? // empty' \
          | sed -n 's/^cn=\([^,]*\),.*/\1/p' \
          | sort -u)
        DECLARED_SET=$(printf '%s\n' $MEMBERS | sort -u)
        TO_ADD=$(comm -23 <(printf '%s\n' "$DECLARED_SET") <(printf '%s\n' "$CURRENT") || true)
        TO_REM=$(comm -13 <(printf '%s\n' "$DECLARED_SET") <(printf '%s\n' "$CURRENT") || true)
        for u in $TO_ADD; do
          LOG "  add-member ${u}"
          openldap-cli group add-member "$CN" "$u"
        done
        for u in $TO_REM; do
          LOG "  remove-member ${u}"
          openldap-cli group remove-member "$CN" "$u"
        done
      else
        LOG "group ${CN}: creating with ${MEMBERS}"
        # `group create` requires at least one --member; extra members added after.
        FIRST=$(printf '%s\n' $MEMBERS | head -n 1)
        REST=$(printf '%s\n' $MEMBERS | tail -n +2)
        openldap-cli group create "$CN" --member "$FIRST"
        for u in $REST; do
          openldap-cli group add-member "$CN" "$u"
        done
      fi

      # Description reconcile (CLI â‰Ą v2026.7.3).
      if [ -n "$DESC" ]; then
        CURRENT_DESC=$(openldap-cli group info "$CN" -o json 2>/dev/null \
          | jq -r '.attrs.description[0]? // empty')
        if [ "$CURRENT_DESC" != "$DESC" ]; then
          LOG "  set description=${DESC}"
          openldap-cli group set "$CN" description "$DESC"
        fi
      fi

      i=$((i + 1))
    done

    LOG "checking drift â€” onGroupRemove=${ON_GROUP_REMOVE}"
    # groups list text form: one CN per line, plus a trailing "(N groups)" tally.
    KNOWN=$(openldap-cli groups list 2>/dev/null | grep -v '^(' | grep -v '^$' || true)
    for cn in $KNOWN; do
      if ! grep -Fxq "$cn" "$DECLARED"; then
        case "$ON_GROUP_REMOVE" in
          delete)
            LOG "drift: deleting group ${cn}"
            openldap-cli group delete "$cn" || true
            ;;
          keep) : ;;
          *) DIE "onGroupRemove=${ON_GROUP_REMOVE}: expected delete|keep" ;;
        esac
      fi
    done
    LOG "groups sync done"

  # ---------------------------------------------------------------------------
  # backup.sh â€” dump the data + config databases to /backup as gzipped LDIF.
  #   * File names follow the values `backup.fileNamePattern` (already resolved
  #     into KIND_FILENAME / DATA_FILENAME env vars by the CronJob spec).
  #   * Retention: after a successful dump, prune files older than
  #     ${RETENTION_DAYS} in /backup.
  # ---------------------------------------------------------------------------
  backup.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap

    : "${DATA_FILENAME:?}"; : "${CONFIG_FILENAME:?}"; : "${RETENTION_DAYS:?}"
    DATA_ARGS=""
    [ "${INCLUDE_OPERATIONAL:-true}" = "true" ] && DATA_ARGS="--operational"

    mkdir -p /backup
    LOG "backup data -> /backup/${DATA_FILENAME}"
    # shellcheck disable=SC2086
    openldap-cli backup data /backup/"${DATA_FILENAME}" $DATA_ARGS

    LOG "backup config -> /backup/${CONFIG_FILENAME}"
    # config backup requires the cn=config admin â€” inject its creds temporarily.
    LDAP_CONFIG_BIND_DN="${LDAP_CONFIG_BIND_DN:-cn=adminconfig,cn=config}" \
    LDAP_CONFIG_BIND_PW="$(cat /secrets/config-admin-password)" \
      openldap-cli backup config /backup/"${CONFIG_FILENAME}"

    LOG "pruning /backup for files older than ${RETENTION_DAYS} days"
    find /backup -type f \
      \( -name '*.ldif.gz' -o -name '*.ldif' -o -name '*.tar.gz' \) \
      -mtime "+${RETENTION_DAYS}" -delete -print
    LOG "backup done"

  # ---------------------------------------------------------------------------
  # accesslog-purge.sh â€” reclaim cn=accesslog MDB space.
  #   `--sweep DD+HH:MM`  drives how often + how deep slapd purges.
  #   `--keep-days N`     minimum retention.
  #   `--dry-run`         no writes, only report what would be deleted.
  # ---------------------------------------------------------------------------
  accesslog-purge.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap

    : "${KEEP_DAYS:?}"; : "${SWEEP:?}"
    ARGS="--keep-days ${KEEP_DAYS} --sweep ${SWEEP}"
    [ "${DRY_RUN:-false}" = "true" ] && ARGS="${ARGS} --dry-run"

    # The purge writes cn=config; use the config-admin credentials.
    export LDAP_CONFIG_BIND_DN="${LDAP_CONFIG_BIND_DN:-cn=adminconfig,cn=config}"
    export LDAP_CONFIG_BIND_PW="$(cat /secrets/config-admin-password)"

    LOG "ops accesslog-purge ${ARGS}"
    # shellcheck disable=SC2086
    openldap-cli ops accesslog-purge ${ARGS}
    LOG "accesslog purge done"

  # ---------------------------------------------------------------------------
  # overlays.sh â€” reconciles overlays via `openldap-cli config overlay
  # enable|disable`. Runs BEFORE ppolicy/users/groups so overlays enabled here
  # (memberof, refint, ppolicy, â€¦) are available when those jobs run.
  # State is tracked in ConfigMap ${RELEASE}-openldap-sync-state key `overlays`.
  # ---------------------------------------------------------------------------
  overlays.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap
    load_config_bind

    [ -f /spec/overlays.json ] || { LOG "no overlays to reconcile"; exit 0; }
    COUNT=$(jq 'length' /spec/overlays.json)
    LOG "reconciling ${COUNT} overlay(s)"

    PREV=/tmp/prev-overlays.json
    state_get overlays > "$PREV"

    DECLARED=/tmp/declared-overlays.json
    jq '[.[] | {name: .name, database: (.database // "")}]' /spec/overlays.json > "$DECLARED"

    i=0
    while [ "$i" -lt "$COUNT" ]; do
      NAME=$(jq -r ".[$i].name" /spec/overlays.json)
      [ -n "$NAME" ] && [ "$NAME" != "null" ] || DIE "overlay #$i has no name"
      ENABLE=$(jq -r ".[$i].enable // true" /spec/overlays.json)
      DB=$(jq -r ".[$i].database // empty" /spec/overlays.json)
      PURGE=$(jq -r ".[$i].purge // false" /spec/overlays.json)
      NO_MOD=$(jq -r ".[$i].noModule // false" /spec/overlays.json)

      DB_ARG=""
      [ -n "$DB" ] && DB_ARG="--db ${DB}"

      if [ "$ENABLE" = "true" ]; then
        FLAGS=""
        [ "$NO_MOD" = "true" ] && FLAGS="--no-module"
        LOG "overlay enable ${NAME} ${DB_ARG} ${FLAGS}"
        # shellcheck disable=SC2086
        openldap-cli config overlay enable "$NAME" $DB_ARG $FLAGS
      else
        FLAGS=""
        [ "$PURGE" = "true" ] && FLAGS="--purge"
        LOG "overlay disable ${NAME} ${DB_ARG} ${FLAGS}"
        # shellcheck disable=SC2086
        openldap-cli config overlay disable "$NAME" $DB_ARG $FLAGS
      fi

      i=$((i + 1))
    done

    # Drift: overlays previously enabled by the chart but no longer declared
    # are DISABLED (never purged automatically â€” data loss risk).
    LOG "checking drift for removed overlays"
    REMOVED=$(jq -c --slurpfile decl "$DECLARED" \
      '[.[] as $p | $decl[0] | map(.name == $p.name and .database == $p.database) | any | not | select(.) | $p]' \
      "$PREV" 2>/dev/null || echo '[]')
    echo "$REMOVED" | jq -c '.[]?' | while read -r item; do
      RN=$(printf '%s' "$item" | jq -r .name)
      RDB=$(printf '%s' "$item" | jq -r '.database // empty')
      DB_ARG=""
      [ -n "$RDB" ] && DB_ARG="--db ${RDB}"
      LOG "drift: disabling overlay ${RN} ${DB_ARG}"
      # shellcheck disable=SC2086
      openldap-cli config overlay disable "$RN" $DB_ARG || true
    done

    state_put overlays "$DECLARED"
    LOG "overlays sync done"

  # ---------------------------------------------------------------------------
  # acls.sh â€” reconciles declarative olcAccess clauses via `openldap-cli config
  # acl grant/revoke`. Each entry owns ONE grantee (group|dn); reconcile always
  # revokes-then-grants so the resulting rule matches the declared shape.
  # State (grantees Ă— databases) tracked in ConfigMap key `acls`.
  # ---------------------------------------------------------------------------
  acls.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap
    load_config_bind

    [ -f /spec/acls.json ] || { LOG "no ACLs to reconcile"; exit 0; }
    COUNT=$(jq 'length' /spec/acls.json)
    LOG "reconciling ${COUNT} ACL clause(s)"

    DEFAULT_DB="olcDatabase={1}mdb,cn=config"

    PREV=/tmp/prev-acls.json
    state_get acls > "$PREV"

    # Declared identity = (database, grantee-kind, grantee-name).
    DECLARED=/tmp/declared-acls.json
    jq --arg ddb "$DEFAULT_DB" '[.[] | {
      name: .name,
      database: (.database // $ddb),
      kind: (if .group then "group" else "dn" end),
      grantee: (.group // .dn)
    }]' /spec/acls.json > "$DECLARED"

    i=0
    while [ "$i" -lt "$COUNT" ]; do
      NAME=$(jq -r ".[$i].name" /spec/acls.json)
      [ -n "$NAME" ] && [ "$NAME" != "null" ] || DIE "acl #$i has no name"
      TARGET=$(jq -r ".[$i].target" /spec/acls.json)
      [ -n "$TARGET" ] && [ "$TARGET" != "null" ] || DIE "acl ${NAME}: target required"
      ACCESS=$(jq -r ".[$i].access" /spec/acls.json)
      [ "$ACCESS" = "read" ] || [ "$ACCESS" = "write" ] || DIE "acl ${NAME}: access must be read|write"
      GROUP=$(jq -r ".[$i].group // empty" /spec/acls.json)
      DN=$(jq -r ".[$i].dn // empty" /spec/acls.json)
      [ -n "$GROUP" ] || [ -n "$DN" ] || DIE "acl ${NAME}: group or dn required"
      [ -n "$GROUP" ] && [ -n "$DN" ] && DIE "acl ${NAME}: group and dn are mutually exclusive"
      DB=$(jq -r --arg d "$DEFAULT_DB" ".[$i].database // \$d" /spec/acls.json)
      SCOPE=$(jq -r ".[$i].scope // empty" /spec/acls.json)
      FILTER=$(jq -r ".[$i].filter // empty" /spec/acls.json)
      AT=$(jq -r ".[$i].at // empty" /spec/acls.json)
      TERM=$(jq -r ".[$i].terminator // empty" /spec/acls.json)

      # 1) revoke every existing clause referencing the grantee (idempotent).
      if [ -n "$GROUP" ]; then
        LOG "acl ${NAME}: revoke group=${GROUP} on ${DB}"
        openldap-cli config acl revoke "$DB" --group "$GROUP" || true
      else
        LOG "acl ${NAME}: revoke dn=${DN} on ${DB}"
        openldap-cli config acl revoke "$DB" --dn "$DN" || true
      fi

      # 2) grant fresh.
      set -- "$DB" "$TARGET" --access "$ACCESS"
      [ -n "$GROUP" ]  && set -- "$@" --group "$GROUP"
      [ -n "$DN" ]     && set -- "$@" --dn "$DN"
      [ -n "$SCOPE" ]  && set -- "$@" --scope "$SCOPE"
      [ -n "$FILTER" ] && set -- "$@" --filter "$FILTER"
      [ -n "$AT" ]     && set -- "$@" --at "$AT"
      [ -n "$TERM" ]   && set -- "$@" --terminator "$TERM"
      LOG "acl ${NAME}: grant target=${TARGET} access=${ACCESS}"
      openldap-cli config acl grant "$@"

      i=$((i + 1))
    done

    # Drift: revoke grantees the chart owned but that are no longer declared.
    LOG "checking drift for removed ACL grantees"
    REMOVED=$(jq -c --slurpfile decl "$DECLARED" '
      [.[] as $p | ($decl[0] | map(.database == $p.database and .kind == $p.kind and .grantee == $p.grantee) | any) as $found
        | if $found then empty else $p end]
    ' "$PREV" 2>/dev/null || echo '[]')
    echo "$REMOVED" | jq -c '.[]?' | while read -r item; do
      RDB=$(printf '%s' "$item" | jq -r .database)
      RK=$(printf '%s' "$item" | jq -r .kind)
      RG=$(printf '%s' "$item" | jq -r .grantee)
      LOG "drift: revoke ${RK}=${RG} on ${RDB}"
      openldap-cli config acl revoke "$RDB" --"$RK" "$RG" || true
    done

    state_put acls "$DECLARED"
    LOG "acls sync done"

  # ---------------------------------------------------------------------------
  # tree-grants.sh â€” reconciles svc grants (container + entry rules).
  # Identity = (name, tree). Removed entries are revoked with --tree so
  # co-grantees keep their rules.
  # ---------------------------------------------------------------------------
  tree-grants.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap
    load_config_bind

    [ -f /spec/tree-grants.json ] || { LOG "no tree grants to reconcile"; exit 0; }
    COUNT=$(jq 'length' /spec/tree-grants.json)
    LOG "reconciling ${COUNT} tree grant(s)"

    PREV=/tmp/prev-tree-grants.json
    state_get tree-grants > "$PREV"

    DECLARED=/tmp/declared-tree-grants.json
    jq '[.[] | {name: .name, tree: .tree}]' /spec/tree-grants.json > "$DECLARED"

    i=0
    while [ "$i" -lt "$COUNT" ]; do
      NAME=$(jq -r ".[$i].name" /spec/tree-grants.json)
      [ -n "$NAME" ] && [ "$NAME" != "null" ] || DIE "tree grant #$i has no name"
      TREE=$(jq -r ".[$i].tree" /spec/tree-grants.json)
      [ -n "$TREE" ] && [ "$TREE" != "null" ] || DIE "tree grant ${NAME}: tree required"
      ACCESS=$(jq -r ".[$i].access // \"read\"" /spec/tree-grants.json)
      MEM=$(jq -r ".[$i].membersOf // empty" /spec/tree-grants.json)

      # revoke existing rules for (name, tree) then re-grant.
      LOG "svc revoke ${NAME} --tree ${TREE}"
      openldap-cli svc revoke "$NAME" --tree "$TREE" || true

      set -- "$NAME" --tree "$TREE" --access "$ACCESS"
      [ -n "$MEM" ] && set -- "$@" --members-of "$MEM"
      LOG "svc grant ${NAME} --tree ${TREE} --access ${ACCESS}"
      openldap-cli svc grant "$@"

      i=$((i + 1))
    done

    LOG "checking drift for removed tree grants"
    REMOVED=$(jq -c --slurpfile decl "$DECLARED" '
      [.[] as $p | ($decl[0] | map(.name == $p.name and .tree == $p.tree) | any) as $found
        | if $found then empty else $p end]
    ' "$PREV" 2>/dev/null || echo '[]')
    echo "$REMOVED" | jq -c '.[]?' | while read -r item; do
      RN=$(printf '%s' "$item" | jq -r .name)
      RT=$(printf '%s' "$item" | jq -r .tree)
      LOG "drift: svc revoke ${RN} --tree ${RT}"
      openldap-cli svc revoke "$RN" --tree "$RT" || true
    done

    state_put tree-grants "$DECLARED"
    LOG "tree grants sync done"

  # ---------------------------------------------------------------------------
  # acl-lint.sh â€” periodic `config acl lint`. Exits non-zero when unreachable /
  # no-op rules are reported so the CronJob shows Failed and can page.
  # ---------------------------------------------------------------------------
  acl-lint.sh: |
    #!/bin/sh
    set -eu
    . /scripts/common.sh
    wait_for_ldap
    load_config_bind

    : "${LINT_DATABASES:=olcDatabase={1}mdb,cn=config}"
    FAILED=0
    # LINT_DATABASES is a space-separated list; each entry may contain commas
    # (e.g. olcDatabase={1}mdb,cn=config) so caller must not use commas as sep.
    for DB in $LINT_DATABASES; do
      LOG "lint ${DB}"
      if ! openldap-cli config acl lint "$DB"; then
        LOG "  FINDINGS on ${DB}"
        FAILED=1
      fi
    done

    if [ "$FAILED" -eq 1 ]; then
      DIE "ACL lint reported unreachable or no-op rules â€” see logs"
    fi
    LOG "acl lint clean"
{{- end }}

{{- /*
Auto-generated Secrets — never overwritten on upgrade thanks to the
`lookup`+fallback pattern. Skipped when the user points at an existing one.
*/ -}}
{{- if not .Values.app.keyExistingSecret -}}
{{- $secretName := printf "%s-app-key" (include "phpldapadmin.fullname" .) -}}
{{- $key := include "phpldapadmin.persistedValue" (dict "context" . "secretName" $secretName "key" "app-key" "prefix" "base64:" "len" 43) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "phpldapadmin.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  app-key: {{ $key | b64enc | quote }}
{{- end }}
{{- if and .Values.bind.username (not .Values.bind.existingSecret) }}
---
{{- $bindName := printf "%s-bind" (include "phpldapadmin.fullname" .) }}
{{- $bindPw := include "phpldapadmin.persistedValue" (dict "context" . "secretName" $bindName "key" "bindpw" "prefix" "" "len" 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $bindName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "phpldapadmin.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  bindpw: {{ $bindPw | b64enc | quote }}
{{- end }}

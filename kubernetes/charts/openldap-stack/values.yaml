# =============================================================================
# openldap-stack — umbrella values
# =============================================================================
# Each subchart is toggleable and its full values tree is accepted under its
# name. Cross-cutting keys (directory suffix, TLS Secret, etc.) are duplicated
# under each subchart where needed — Helm does not share values across
# subcharts, so keep them in sync via `helm upgrade --set` or a single overlay.
# =============================================================================

openldap:
  enabled: true

  # ---------------------------------------------------------------------------
  # See kubernetes/charts/openldap-stack/charts/openldap/values.yaml for the
  # full documented value tree. Override any key here to change the default.
  # Example:
  #   openldap:
  #     directory:
  #       suffix: dc=corp,dc=example,dc=com
  #     admin:
  #       existingSecret: openldap-admin-passwords
  #     persistence:
  #       size: 50Gi
  # ---------------------------------------------------------------------------

phpldapadmin:
  # See kubernetes/charts/openldap-stack/charts/phpldapadmin/values.yaml for
  # the full value tree. Sensible defaults auto-wire the LDAP host to
  # `<release>-openldap.<ns>.svc.cluster.local`, so enabling this side-by-side
  # with the openldap subchart is a one-liner:
  #   phpldapadmin:
  #     enabled: true
  enabled: false

self-service-password:
  # LTB Self Service Password. See
  # kubernetes/charts/openldap-stack/charts/self-service-password/values.yaml
  # for the full value tree. Enabling this requires a bind account in LDAP —
  # declare it via openldap.users (uid: ssp) and pass its Secret name via
  #   self-service-password.ldap.bind.existingSecret:
  enabled: false

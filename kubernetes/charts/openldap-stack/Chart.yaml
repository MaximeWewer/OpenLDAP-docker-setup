apiVersion: v2
name: openldap-stack
description: |
  Umbrella chart for the OpenLDAP stack: OpenLDAP 2.6 server, phpLDAPadmin,
  and Self Service Password. Declarative GitOps-friendly administration via
  openldap-cli (https://github.com/MaximeWewer/openldap-cli).
type: application
version: 0.1.0
appVersion: "2.6.13"
kubeVersion: ">=1.27.0-0"
keywords:
  - openldap
  - ldap
  - directory
  - phpldapadmin
  - self-service-password
home: https://github.com/MaximeWewer/OpenLDAP-docker-setup
sources:
  - https://github.com/MaximeWewer/OpenLDAP-docker-setup
  - https://github.com/MaximeWewer/openldap-cli
  - https://github.com/MaximeWewer/OpenLDAP_prometheus_exporter
maintainers:
  - name: MaximeWewer
    url: https://github.com/MaximeWewer
dependencies:
  - name: openldap
    version: 0.1.0
    repository: "file://charts/openldap"
    condition: openldap.enabled
  - name: phpldapadmin
    version: 0.1.0
    repository: "file://charts/phpldapadmin"
    condition: phpldapadmin.enabled
  - name: self-service-password
    version: 0.1.0
    repository: "file://charts/self-service-password"
    condition: self-service-password.enabled
